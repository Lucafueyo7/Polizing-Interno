<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Chatbot</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f5f5f2; margin: 0; color: #1d1d1b; }
      main { max-width: 420px; margin: 12vh auto; background: white; padding: 32px; border-radius: 18px; box-shadow: 0 12px 40px rgba(0,0,0,.08); }
      label { display: block; font-weight: 650; margin-top: 16px; }
      input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-top: 6px; }
      button { width: 100%; margin-top: 24px; padding: 12px; border: 0; border-radius: 10px; background: #174c3c; color: white; font-weight: 700; cursor: pointer; }
      .error { color: #9c1f1f; background: #ffe7e7; padding: 10px; border-radius: 10px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Admin Chatbot</h1>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="post" action="/admin/login">
        <label>Usuario</label>
        <input name="username" autocomplete="username" required>
        <label>Contrasena</label>
        <input name="password" type="password" autocomplete="current-password" required>
        <button>Ingresar</button>
      </form>
    </main>
  </body>
</html>
